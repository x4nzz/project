<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Key Checker</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #results { margin-top: 20px; }
        .row { margin-bottom: 5px; display: flex; justify-content: space-between; }
        .key { font-family: monospace; }
        .valid { color: green; font-weight: bold; }
        .invalid { color: red; font-weight: bold; }
        .stop-message { color: gold; background: #333; padding: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <h1>Stripe Key Checker</h1>
    <textarea id="input" placeholder="Paste 500-2000 keys here, one per line"></textarea>
    <button onclick="checkKeys()">Check Keys</button>
    <div id="results"></div>
    <div id="stop-message" class="stop-message"></div>

    <script>
        async function checkKeys() {
            const keysText = document.getElementById('input').value;
            const keys = keysText.split('\n').filter(k => k.trim() !== '');
            const resultsDiv = document.getElementById('results');
            const stopMessage = document.getElementById('stop-message');

            if (keys.length === 0) {
                alert('Please enter some keys');
                return;
            }

            resultsDiv.innerHTML = 'Checking...';
            stopMessage.style.display = 'none';

            const eventSource = new EventSource('/check-keys', {
                method: 'POST',
                body: JSON.stringify({ keys: keys })
            });

            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);

                if (data.found) {
                    // The specific requirement: "make it stop and show the key that was valid"
                    stopMessage.textContent = `Sk_live${data.key.slice(-10)} was valid!`; 
                    stopMessage.style.display = 'block';
                    eventSource.close();
                    return;
                }

                if (data === 'done') {
                    resultsDiv.innerHTML += '<p>Check complete.</p>';
                    eventSource.close();
                    return;
                }

                if (data.error) {
                    resultsDiv.innerHTML += `<p>${data.error}</p>`;
                    return;
                }

                // Display individual key results
                const row = document.createElement('div');
                row.className = 'row';
                
                // Truncate key for display if it's very long
                const shortKey = data.key.length > 15 ? data.key.substring(0, 15) + '...' : data.key;
                
                const statusText = data.status === 'valid' ? '[VALID]' : '[INVALID]';
                const statusClass = data.status === 'valid' ? 'valid' : 'invalid';

                row.innerHTML = `
                    <span class="key">${shortKey}</span>
                    <span class="${statusClass}">${statusText}</span>
                `;
                resultsDiv.appendChild(row);
            };
        }
    </script>
</body>
</html>
